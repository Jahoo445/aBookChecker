@if (_isLoading()) {
  <p>Loading...</p>
} @else if (_error()) {
  <p>{{ _error() }}</p>
} @else {
  <div class="button-list">
    @for (audiobook of _audiobooks(); track audiobook.artistId) {
      <button type="button" class="image-button" (click)="_selectAudiobook(audiobook)">
        @if (audiobook.imageUrl) {
          <img [src]="audiobook.imageUrl" [alt]="audiobook.artistName" />
        } @else {
          <span>{{ audiobook.artistName }}</span>
        }
      </button>
    }
  </div>
}
