@if (_isLoading()) {
  <p>Loading...</p>
} @else if (_error()) {
  <p>{{ _error() }}</p>
} @else {
  <div class="button-list">
    @for (audiobook of _audiobooks(); track audiobook.artistId) {
      <button type="button" (click)="_selectAudiobook(audiobook)">
        {{ audiobook.artistName }}
      </button>
    }
  </div>
}
